apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-deployment
  labels:
    app: log-output
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      volumes:
        - name: shared-logs
          emptyDir: {}

      containers:
        - name: log-generator-container
          image: log-generator
          imagePullPolicy: IfNotPresent
          env:
            - name: FILES_DIR
              value: "/usr/src/app/files"
            - name: FILE_NAME
              value: "log.txt"
          volumeMounts:
            - name: shared-logs
              mountPath: /usr/src/app/files

        - name: log-reader-container
          image: log-reader
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: FILES_DIR
              value: "/usr/src/app/files"
            - name: FILE_NAME
              value: "log.txt"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: shared-logs
              mountPath: /usr/src/app/files
