apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-output-deployment
  namespace: exercises
  labels:
    app: log-output
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-output
  template:
    metadata:
      labels:
        app: log-output
    spec:
      containers:
        - name: log-generator-container
          image: log-generator
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3001"
          ports:
            - containerPort: 3001

        - name: log-reader-container
          image: log-reader
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
            - name: GENERATOR_URL
              value: "http://localhost:3001/"
            - name: PINGPONG_URL
              value: "http://pingpong-svc:2345/pingpong"
            - name: MESSAGE
              valueFrom:
                configMapKeyRef:
                  name: log-output-configmap
                  key: MESSAGE
            - name: INFO_CONFIG_PATH
              valueFrom:
                configMapKeyRef:
                  key: INFO_CONFIG_PATH
                  name: log-output-configmap
          volumeMounts:
            - name: config-volume
              mountPath: /usr/src/app/files
              readOnly: true
          ports:
            - containerPort: 3000

      volumes:
        - name: config-volume
          configMap:
            name: log-output-configmap
