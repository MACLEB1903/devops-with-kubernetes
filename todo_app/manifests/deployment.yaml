apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-frontend-deployment
  namespace: project
  labels:
    app: todo-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-frontend
  template:
    metadata:
      labels:
        app: todo-frontend
    spec:
      dnsPolicy: Default
      volumes:
        - name: todo-volumes
          persistentVolumeClaim:
            claimName: todo-pvclaim

      containers:
        - name: image-worker
          image: image-worker
          command: ["npm"]
          args: ["run", "image-worker"]
          imagePullPolicy: IfNotPresent
          env:
            - name: FILES_DIR
              valueFrom:
                configMapKeyRef:
                  name: todo-configmap
                  key: FILES_DIR

            - name: IMAGE_NAME
              valueFrom:
                configMapKeyRef:
                  name: todo-configmap
                  key: IMAGE_NAME

            - name: PICSUM_URL
              valueFrom:
                configMapKeyRef:
                  name: todo-configmap
                  key: PICSUM_URL

          volumeMounts:
            - name: todo-volumes
              mountPath: "/usr/src/app/files"

        - name: image-backend
          image: image-backend
          command: ["npm"]
          args: ["run", "image-backend"]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: IMAGE_NAME
              valueFrom:
                configMapKeyRef:
                  key: IMAGE_NAME
                  name: todo-configmap
            - name: FILES_DIR
              valueFrom:
                configMapKeyRef:
                  key: FILES_DIR
                  name: todo-configmap

          volumeMounts:
            - name: todo-volumes
              mountPath: "/usr/src/app/files"

        - name: todo-frontend
          image: todo-frontend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: VITE_IMAGE_FETCH_URL
              valueFrom:
                configMapKeyRef:
                  name: todo-configmap
                  key: VITE_IMAGE_FETCH_URL
            - name: VITE_TODOS_FETCH_URL
              valueFrom:
                configMapKeyRef:
                  key: VITE_TODOS_FETCH_URL
                  name: todo-configmap

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend-deployment
  namespace: project
  labels:
    app: todo-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend

    spec:
      containers:
        - image: todo-backend
          name: todo-backend
          command: ["npm"]
          args: ["run", "todo-backend"]
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "3000"
          ports:
            - containerPort: 3000
