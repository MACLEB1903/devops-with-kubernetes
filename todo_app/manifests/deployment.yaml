apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-deployment
  labels:
    app: todo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo
  template:
    metadata:
      labels:
        app: todo
    spec:
      dnsPolicy: Default
      volumes:
        - name: todo-volumes
          persistentVolumeClaim:
            claimName: todo-pvclaim

      containers:
        - name: todo-fetcher
          image: todo-fetcher
          command: ["npm"]
          args: ["run", "fetch"]
          imagePullPolicy: IfNotPresent
          env:
            - name: FILES_DIR
              value: "/usr/src/app/files"
            - name: IMAGE_NAME
              value: "image.jpg"
            - name: PICSUM_URL
              value: "https://picsum.photos/1200"
          volumeMounts:
            - name: todo-volumes
              mountPath: "/usr/src/app/files"

        - name: todo-api
          image: todo-api
          command: ["npm"]
          args: ["start"]
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: FILES_DIR
              value: "/usr/src/app/files"
            - name: IMAGE_NAME
              value: "image.jpg"
          volumeMounts:
            - name: todo-volumes
              mountPath: "/usr/src/app/files"

        - name: todo-frontend
          image: todo-frontend
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: VITE_FETCH_URL
              value: "/image"
